<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pata Keja</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root{--green:#00A651}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#F5F5F5}
.header{background:var(--green);color:#fff;padding:12px 16px;display:flex;justify-content:space-between}
.logo{font-weight:700;font-size:20px}
.debug{background:#FFF3CD;padding:12px;margin:12px;border-radius:8px;font-size:14px}
.list{padding:16px;display:grid;gap:12px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.card-img{width:100%;height:160px;object-fit:cover}
.card-body{padding:12px}
.price{font-size:18px;font-weight:700;color:var(--green)}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Pata Keja</div>
  <div>Login</div>
</div>

<div id="debug" class="debug">1. HTML loaded</div>

<div id="list" class="list">Loading...</div>

<script>
const debug = document.getElementById('debug');
function log(m){ debug.innerHTML += '<br>' + m; }

// Check if supabase loaded
if (typeof window.supabase === 'undefined') {
  log('2. ERROR: Supabase library FAILED to load');
  log('3. Check internet connection');
} else {
  log('2. Supabase library loaded OK');

  const SUPABASE_URL = 'https://edboplgobqnjlncplrhq.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkYm9wbGdvYnFuamxuY3BscmhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzQ0MzAsImV4cCI6MjA5NzAxMDQzMH0.1o8FH7jaQik7VZeE3iSIhd_Qdou-tTsYqdq1ShY3dqw';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  log('3. Client created');

  supabase.from('listings').select('*').limit(20).then(({data, error}) => {
    if (error) {
      log('4. ERROR: ' + error.message);
      document.getElementById('list').innerHTML = 'Error: ' + error.message;
    } else {
      log('4. SUCCESS: Got ' + data.length + ' listings');
      document.getElementById('list').innerHTML = data.map(l => `
        <div class="card">
          <img src="${l.images?.[0]||'https://via.placeholder.com/400'}" class="card-img">
          <div class="card-body">
            <div class="price">KES ${l.price?.toLocaleString()}</div>
            <div>${l.title}</div>
            <div style="color:#666;font-size:14px">${l.estate}</div>
          </div>
        </div>
      `).join('');
    }
  }).catch(e => {
    log('5. CATCH: ' + e.message);
  });
}
</script>

</body>
</html>
