<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pata Keja</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:system-ui;background:#F5F5F5}
.header{background:#00A651;color:#fff;padding:12px 16px;font-weight:700}
.debug{background:#FFF3CD;padding:12px;margin:12px;border-radius:8px;font-size:14px}
.card{background:#fff;margin:12px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.card img{width:100%;height:180px;object-fit:cover}
.card-body{padding:12px}
.price{color:#00A651;font-weight:700;font-size:18px}
</style>
</head>
<body>
<div class="header">Pata Keja</div>
<div id="debug" class="debug">Loading...</div>
<div id="list"></div>
<script>
const debug=document.getElementById('debug');
const supabase=window.supabase.createClient('https://edboplgobqnjlncplrhq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkYm9wbGdvYnFuamxuY3BscmhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzQ0MzAsImV4cCI6MjA5NzAxMDQzMH0.1o8FH7jaQik7VZeE3iSIhd_Qdou-tTsYqdq1ShY3dqw');
debug.innerHTML='1. HTML loaded<br>2. Supabase OK<br>3. Fetching...';
supabase.from('listings').select('*').limit(20).then(({data,error})=>{
  if(error){debug.innerHTML+='<br>ERROR: '+error.message;return}
  debug.innerHTML+='<br>4. SUCCESS: Got '+data.length+' listings';
  document.getElementById('list').innerHTML=data.map(l=>`<div class="card"><img src="${l.images?.[0]||'https://via.placeholder.com/400'}"><div class="card-body"><div class="price">KES ${l.price?.toLocaleString()}</div><div>${l.title}</div><div style="color:#666;font-size:14px">${l.estate}</div></div></div>`).join('');
});
</script>
</body>
</html>
