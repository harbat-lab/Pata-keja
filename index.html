<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pata Keja - Houses & Shops in Nairobi</title>
<style>
:root{--green:#00A651}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#F5F5F5}
.header{background:var(--green);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0}
.logo{font-weight:700;font-size:20px}
.btn{background:var(--green);color:#fff;border:none;padding:10px 16px;border-radius:8px;font-weight:600;cursor:pointer}
.btn-outline{background:#fff;color:var(--green);border:1px solid var(--green);padding:8px 12px;border-radius:8px}
.filters{padding:12px 16px;background:#fff;display:flex;gap:8px;overflow-x:auto}
.chip{padding:6px 12px;border:1px solid #ddd;border-radius:20px;font-size:14px;white-space:nowrap;cursor:pointer}
.chip.active{background:var(--green);color:#fff;border-color:var(--green)}
.list{padding:16px;display:grid;gap:12px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer}
.card img{width:100%;height:180px;object-fit:cover}
.card-body{padding:12px}
.price{color:var(--green);font-weight:700;font-size:18px}
.meta{color:#666;font-size:14px;margin-top:4px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal.active{display:flex}
.box{background:#fff;border-radius:16px;max-width:400px;width:100%;padding:20px}
.input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin:8px 0}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Pata Keja</div>
  <div id="hdr"><button class="btn-outline" onclick="login()">Login</button></div>
</div>

<div class="filters">
  <div class="chip active" onclick="filter('all',this)">All</div>
  <div class="chip" onclick="filter('house',this)">Houses</div>
  <div class="chip" onclick="filter('shop',this)">Shops</div>
  <div class="chip" onclick="filter('single',this)">Single</div>
</div>

<div id="list" class="list">Loading...</div>

<div id="loginM" class="modal">
  <div class="box">
    <h3>Login with M-Pesa</h3>
    <input id="phone" class="input" placeholder="0712345678">
    <button class="btn" style="width:100%" onclick="sendOTP()">Send Code</button>
    <div id="otpBox" style="display:none;margin-top:12px">
      <input id="otp" class="input" placeholder="4-digit code" maxlength="4">
      <button class="btn" style="width:100%" onclick="verify()">Verify</button>
    </div>
    <p id="loginMsg" style="font-size:14px;color:#666;margin-top:8px"></p>
  </div>
</div>

<div id="payM" class="modal">
  <div class="box">
    <h3>Unlock Contact - 100 KES</h3>
    <p>Pay via M-Pesa to see number</p>
    <button id="payBtn" class="btn" style="width:100%;margin-top:12px" onclick="pay()">Pay 100 KES</button>
    <p id="payMsg" style="font-size:14px;color:#666;margin-top:8px"></p>
  </div>
</div>

<script>
const API='https://pata-keja-oo6v.onrender.com';
const SB_URL='https://edboplgobqnjlncplrhq.supabase.co/rest/v1';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkYm9wbGdvYnFuamxuY3BscmhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzQ0MzAsImV4cCI6MjA5NzAxMDQzMH0.1o8FH7jaQik7VZeE3iSIhd_Qdou-tTsYqdq1ShY3dqw';

let listings=[], user=JSON.parse(localStorage.getItem('pk_user')||'null'), current=null, f='all';

function hdr(){document.getElementById('hdr').innerHTML=user?`<span style="font-size:14px">${user.phone}</span>`:`<button class="btn-outline" onclick="login()">Login</button>`}
hdr();

fetch(`${SB_URL}/listings?select=*&limit=50`,{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}})
.then(r=>r.json()).then(d=>{listings=d;render()});

function render(){
  const l=document.getElementById('list');
  const fil=listings.filter(x=>f==='all'||x.type===f);
  l.innerHTML=fil.map(x=>`
    <div class="card" onclick="view(${x.id})">
      <img src="${x.images?.[0]||'https://via.placeholder.com/400'}">
      <div class="card-body">
        <div class="price">KES ${x.price?.toLocaleString()}/mo</div>
        <div>${x.title}</div>
        <div class="meta">${x.estate} • ${x.beds||''}</div>
      </div>
    </div>`).join('');
}

function filter(t,el){f=t;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');render()}
function login(){document.getElementById('loginM').classList.add('active')}
function closeM(){document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active'))}

async function sendOTP(){
  const p=document.getElementById('phone').value.replace(/\s/g,'');
  await fetch(`${API}/api/auth/send-otp`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:p})});
  document.getElementById('otpBox').style.display='block';
  document.getElementById('loginMsg').textContent='Code sent';
}
async function verify(){
  const p=document.getElementById('phone').value.replace(/\s/g,'');
  const o=document.getElementById('otp').value;
  const r=await fetch(`${API}/api/auth/verify-otp`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:p,otp:o})});
  const d=await r.json();
  if(d.success){user=d.user;localStorage.setItem('pk_user',JSON.stringify(user));closeM();hdr();if(current)view(current.id)}
  else{document.getElementById('loginMsg').textContent='Wrong code'}
}
async function view(id){
  current=listings.find(x=>x.id===id);
  if(!user){login();return}
  const r=await fetch(`${API}/api/unlocks/check?user_id=${user.id}&listing_id=${id}`);
  const d=await r.json();
  if(d.unlocked){alert('Caretaker: '+d.phone)}else{document.getElementById('payM').classList.add('active')}
}
async function pay(){
  document.getElementById('payBtn').disabled=true;
  document.getElementById('payMsg').textContent='Check phone for M-Pesa...';
  await fetch(`${API}/api/pochi/stkpush`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:user.phone,amount:100,reference:`UNLOCK_${current.id}`,description:'Pata Keja',user_id:user.id,listing_id:current.id})});
}
</script>
</body>
</html>
