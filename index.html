<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pata Keja — Pay to Unlock Contacts</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>body{background:#0a0a0a;color:#fff;font-family:Inter,system-ui}.card{background:#141414;border:1px solid #222}</style>
</head>
<body>
<header class="sticky top-0 z-40 bg-black/80 backdrop-blur border-b border-zinc-800">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2 font-bold text-xl"><span class="w-8 h-8 bg-white text-black grid place-items-center rounded">P</span>Pata Keja</div>
    <div id="hdr" class="flex items-center gap-3"></div>
  </div>
</header>
<main class="max-w-6xl mx-auto px-4 py-6"><div id="grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4"></div></main>
<div id="modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center p-4 z-50">
  <div class="bg-zinc-900 w-full max-w-lg rounded-2xl border border-zinc-800"><div class="p-4 border-b border-zinc-800 flex justify-between"><h3 id="mTitle" class="font-bold"></h3><button onclick="closeM()" class="text-zinc-400">✕</button></div><div id="mBody" class="p-4"></div></div>
</div>
<script>
const API='https://pata-keja-oo6v.onrender.com';
const SUPABASE_URL='https://edboplgobqnjlncplrhq.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkYm9wbGdvYnFuamxuY3BscmhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzQ0MzAsImV4cCI6MjA5NzAxMDQzMH0.1o8FH7jaQik7VZeE3iSIhd_Qdou-tTsYqdq1ShY3dqw';
const supa=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
let user=JSON.parse(localStorage.getItem('pk_user')||'null');let current=null;
function hdr(){document.getElementById('hdr').innerHTML=user?`<span class="text-sm text-zinc-400">${user.phone}</span><button onclick="logout()" class="px-3 py-1.5 bg-zinc-800 rounded-lg text-sm">Logout</button>`:`<button onclick="login()" class="px-4 py-2 bg-white text-black rounded-xl font-semibold">Login</button>`;}
function logout(){localStorage.removeItem('pk_user');user=null;hdr();}
function normalizePhone(p){p=p.replace(/\s+/g,'').replace('+','');if(p.startsWith('0'))return'254'+p.slice(1);if(p.startsWith('254'))return p;return'254'+p;}
function login(){openM('Login with M-Pesa',`<div class="space-y-3"><input id="phone" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3" placeholder="07xx xxx xxx"><button onclick="sendOTP()" class="w-full py-3 bg-white text-black rounded-xl font-semibold">Send Code</button><div id="otpBox" class="hidden space-y-3"><input id="otp" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3" placeholder="Enter 4-digit code"><button onclick="verify()" class="w-full py-3 bg-white text-black rounded-xl font-semibold">Verify</button></div><p id="loginMsg" class="text-sm text-zinc-400"></p></div>`);}
async function sendOTP(){const raw=document.getElementById('phone').value;const p=normalizePhone(raw);localStorage.setItem('pk_phone',p);document.getElementById('loginMsg').textContent='Sending...';const r=await fetch(`${API}/api/auth/send-otp`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:p})});const d=await r.json();document.getElementById('otpBox').style.display='block';document.getElementById('loginMsg').textContent=d.debug_otp?`CODE: ${d.debug_otp}`:'Code sent';}
async function verify(){const p=localStorage.getItem('pk_phone');const o=document.getElementById('otp').value;const r=await fetch(`${API}/api/auth/verify-otp`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:p,otp:o})});const d=await r.json();if(d.success){user=d.user;localStorage.setItem('pk_user',JSON.stringify(user));closeM();hdr();}else{document.getElementById('loginMsg').textContent='Wrong code';}}
async function load(){const{data}=await supa.from('listings').select('*').order('created_at',{ascending:false}).limit(30);document.getElementById('grid').innerHTML=(data||[]).map(l=>`<div class="card rounded-2xl overflow-hidden cursor-pointer" onclick="view('${l.id}')"><img src="${l.image_url||'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2'}" class="w-full h-48 object-cover"><div class="p-4"><div class="font-bold">${l.title}</div><div class="text-zinc-400 text-sm">KES ${l.price?.toLocaleString()}</div><div class="mt-2 text-xs px-2 py-1 bg-zinc-800 inline-block rounded">Unlock: KES 100</div></div></div>`).join('');}
async function view(id){const{data:l}=await supa.from('listings').select('*').eq('id',id).single();current=l;let unlocked=false,phone='';if(user){try{const r=await fetch(`${API}/api/unlocks/check?user_id=${user.id}&listing_id=${id}`);const d=await r.json();unlocked=d.unlocked;phone=d.phone||l.caretaker_phone;}catch(e){}}openM(l.title,`<img src="${l.image_url||'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2'}" class="w-full h-56 object-cover rounded-xl mb-4"><p class="text-zinc-300 mb-4">${l.description||''}</p><div class="p-4 bg-zinc-800 rounded-xl">${unlocked?`<div class="font-mono text-lg">${phone}</div><a href="tel:${phone}" class="mt-2 inline-block px-4 py-2 bg-green-600 rounded-lg">Call Now</a>`:`<div class="mb-2">Pay KES 100 to reveal caretaker number</div><button onclick="pay()" class="w-full py-3 bg-white text-black rounded-xl font-semibold">Pay with M-Pesa</button><p id="payMsg" class="text-sm text-zinc-400 mt-2"></p>`}</div>`);}
async function pay(){if(!user)return login();document.getElementById('payMsg').textContent='Sending STK...';const r=await fetch(`${API}/api/pochi/stkpush`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:user.phone,amount:100,user_id:user.id,listing_id:current.id})});const d=await r.json();document.getElementById('payMsg').textContent=d.ResponseCode==='0'?'Check your phone for M-Pesa prompt':'Error - try again';}
function openM(t,h){document.getElementById('mTitle').textContent=t;document.getElementById('mBody').innerHTML=h;document.getElementById('modal').classList.remove('hidden');document.getElementById('modal').classList.add('flex');}
function closeM(){document.getElementById('modal').classList.add('hidden');}
hdr();load();
</script>
</body>
</html>
