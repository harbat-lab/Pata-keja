<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pata Keja</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
    .header {
      background: #10b981;
      color: white;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .container {
      padding: 15px;
    }
    #map {
      height: 400px;
      width: 100%;
      border-radius: 12px;
      margin: 10px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .house-card {
      background: white;
      padding: 12px;
      border-radius: 8px;
      margin: 10px 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="header">
    <span>Pata Keja</span>
    <span style="font-size:14px; font-weight:normal;">Login</span>
  </div>

  <div class="container">
    <!-- Map goes here -->
    <div id="map"></div>
    
    <!-- Video section -->
    <h3>See how Pata Keja works in 60 sec</h3>
    <video width="100%" controls style="border-radius: 8px;">
      <source src="" type="video/mp4">
      Your browser does not support video.
    </video>
    <p style="font-size: 14px; color: #555;">Caretakers: Upload 15-sec video tours to get 3x more views</p>
    
    <!-- Houses list -->
    <h3>Houses near you</h3>
    <div id="list"></div>
    <p id="loading" style="text-align:center; color:#666;">Loading houses near you...</p>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <script>
    let map;
    let markers = [];
    
    // Sample house data for Nairobi
    const houses = [
      { lat: -1.2921, lng: 36.8219, title: "1BR in CBD", price: "Ksh 25,000" },
      { lat: -1.3001, lng: 36.7845, title: "Bedsitter Kilimani", price: "Ksh 15,000" },
      { lat: -1.2676, lng: 36.8118, title: "2BR Westlands", price: "Ksh 45,000" },
      { lat: -1.3032, lng: 36.8770, title: "1BR Buruburu", price: "Ksh 18,000" }
    ];

    function initMap(){
      // Create map centered on Nairobi
      map = L.map('map').setView([-1.2921, 36.8219], 12);
      
      // Add OpenStreetMap tiles
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);
      
      // Add house markers
      renderMapPins();
      renderListings();
      document.getElementById('loading').style.display = 'none';
    }

    function renderMapPins(){
      houses.forEach(house => {
        const marker = L.marker([house.lat, house.lng])
          .addTo(map)
          .bindPopup(`<b>${house.title}</b><br>${house.price}`);
        markers.push(marker);
      });
    }

    function renderListings(){
      const list = document.getElementById('list');
      list.innerHTML = '';
      houses.forEach(house => {
        const card = document.createElement('div');
        card.className = 'house-card';
        card.innerHTML = `<b>${house.title}</b><br>${house.price}`;
        list.appendChild(card);
      });
    }

    // Load map when page is ready
    document.addEventListener('DOMContentLoaded', initMap);
  </script>
</body>
</html>
