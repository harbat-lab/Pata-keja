<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pata Keja - Houses & Shops in Nairobi</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root{--green:#00A651;--dark:#1A1A1A;--gray:#F5F5F5;--gold:#FFB300}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:var(--gray);color:var(--dark)}
.header{background:var(--green);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000}
.logo{font-weight:700;font-size:20px}
.btn{background:var(--green);color:#fff;border:none;padding:10px 16px;border-radius:8px;font-weight:600;cursor:pointer}
.btn-outline{background:#fff;color:var(--green);border:1px solid var(--green);padding:8px 12px;border-radius:8px;font-weight:600;cursor:pointer}
.btn:disabled{opacity:0.5}
.filters{padding:12px 16px;background:#fff;border-bottom:1px solid #ddd;display:flex;gap:8px;overflow-x:auto}
.filter-chip{padding:6px 12px;border:1px solid #ddd;border-radius:20px;font-size:14px;white-space:nowrap;cursor:pointer}
.filter-chip.active{background:var(--green);color:#fff;border-color:var(--green)}
#map{height:35vh;width:100%}
.list{padding:16px;display:grid;gap:12px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);position:relative;cursor:pointer}
.card-img{width:100%;height:160px;object-fit:cover;background:#eee}
.card-body{padding:12px}
.price{font-size:18px;font-weight:700;color:var(--green)}
.meta{font-size:14px;color:#666;margin:4px 0}
.badge{display:inline-block;font-size:12px;padding:2px 8px;border-radius:4px;background:#E8F5E9;color:var(--green);margin-right:4px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:2000;padding:16px}
.modal.active{display:flex}
.modal-box{background:#fff;border-radius:16px;max-width:400px;width:100%;max-height:90vh;overflow:auto}
.modal-head{padding:16px;border-bottom:1px solid #eee;font-weight:700;display:flex;justify-content:space-between}
.modal-body{padding:16px}
.input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin:8px 0}
.loading{text-align:center;padding:40px;color:#666}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Pata Keja</div>
  <div id="headerRight"><button class="btn-outline" onclick="showLogin()">Login</button></div>
</div>

<div class="filters">
  <div class="filter-chip active" onclick="setFilter('type','all',this)">All</div>
  <div class="filter-chip" onclick="setFilter('type','house',this)">Houses</div>
  <div class="filter-chip" onclick="setFilter('type','shop',this)">Shops</div>
  <div class="filter-chip" onclick="setFilter('type','single',this)">Single</div>
</div>

<div id="map"></div>

<div id="list" class="list"><div class="loading">Loading houses...</div></div>

<!-- Login Modal -->
<div id="loginModal" class="modal">
  <div class="modal-box">
    <div class="modal-head"><span>Login</span><span onclick="closeModal('loginModal')" style="cursor:pointer">✕</span></div>
    <div class="modal-body">
      <div id="loginStep1">
        <p style="font-size:14px;color:#666">Enter M-Pesa number</p>
        <input id="loginPhone" class="input" type="tel" placeholder="0712 345 678">
        <button id="sendOtpBtn" class="btn" style="width:100%" onclick="sendOTP()">Send Code</button>
      </div>
      <div id="loginStep2" style="display:none">
        <p style="font-size:14px">Code sent to <span id="phoneDisplay"></span></p>
        <input id="otpInput" class="input" type="tel" maxlength="4" placeholder="0000" style="text-align:center;letter-spacing:8px">
        <button class="btn" style="width:100%" onclick="verifyOTP()">Verify</button>
        <p id="loginStatus" style="font-size:14px;margin-top:12px"></p>
      </div>
    </div>
  </div>
</div>

<!-- Pay Modal -->
<div id="payModal" class="modal">
  <div class="modal-box">
    <div class="modal-head"><span>Unlock Contact - 100 KES</span><span onclick="closeModal('payModal')" style="cursor:pointer">✕</span></div>
    <div class="modal-body">
      <p>Pay via M-Pesa to see caretaker number</p>
      <button id="payBtn" class="btn" style="width:100%" onclick="initiateSTK()">Pay 100 KES</button>
      <p id="payStatus" style="font-size:14px;margin-top:12px;color:#666"></p>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API_URL = 'https://pata-keja-oo6v.onrender.com';
const SUPABASE_URL = 'https://edboplgobqnjlncplrhq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkYm9wbGdvYnFuamxuY3BscmhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzQ0MzAsImV4cCI6MjA5NzAxMDQzMH0.1o8FH7jaQik7VZeE3iSIhd_Qdou-tTsYqdq1ShY3dqw';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let map, markers=[], currentListing=null, currentUser=null, allListings=[], filters={type:'all'}, pendingAction=null;

window.addEventListener('load', async ()=>{
  currentUser = JSON.parse(localStorage.getItem('patakeja_user')||'null');
  updateHeader();
  await loadListings();
  initMap();
});

function updateHeader(){
  const el = document.getElementById('headerRight');
  el.innerHTML = currentUser? `<span style="font-size:14px;margin-right:8px">${currentUser.phone}</span>` : `<button class="btn-outline" onclick="showLogin()">Login</button>`;
}

async function loadListings(){
  const { data, error } = await supabase.from('listings').select('*').limit(50);
  if(error){ document.getElementById('list').innerHTML = 'Error: '+error.message; return; }
  allListings = data || [];
  renderListings();
}

function initMap(){
  try{
    map = L.map('map').setView([-1.2921, 36.8219], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    renderMapPins();
  }catch(e){}
}

function renderListings(){
  const list = document.getElementById('list');
  if(map){ markers.forEach(m=>map.removeLayer(m)); markers=[]; }
  let filtered = allListings.filter(l=> filters.type==='all' || l.type===filters.type );
  list.innerHTML = filtered.map(l=>`
    <div class="card" onclick="viewListing(${l.id})">
      <img src="${l.images?.[0]||'https://via.placeholder.com/400x160'}" class="card-img">
      <div class="card-body">
        <div class="price">KES ${l.price?.toLocaleString()}/mo</div>
        <div class="meta">${l.title}</div>
        <div class="meta">${l.estate} • ${l.beds||''}</div>
        ${l.verified?'<span class="badge">✓ Verified</span>':''}
      </div>
    </div>
  `).join('');
  renderMapPins(filtered);
}

function renderMapPins(listings=allListings){
  if(!map) return;
  listings.forEach(l=>{
    if(!l.lat||!l.lng) return;
    const m = L.marker([l.lat,l.lng]).addTo(map).bindPopup(l.title);
    markers.push(m);
  });
}

function setFilter(k,v,el){ filters[k]=v; document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); renderListings(); }
function showLogin(){ document.getElementById('loginModal').classList.add('active'); }
function closeModal(id){ document.getElementById(id).classList.remove('active'); }
function requireLogin(cb){ if(currentUser){cb()} else{pendingAction=cb;showLogin()} }

async function sendOTP(){
  const phone=document.getElementById('loginPhone').value.replace(/\s/g,'');
  await fetch(`${API_URL}/api/auth/send-otp`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone})});
  document.getElementById('loginStep1').style.display='none';
  document.getElementById('loginStep2').style.display='block';
  document.getElementById('phoneDisplay').textContent=phone;
}
async function verifyOTP(){
  const phone=document.getElementById('loginPhone').value.replace(/\s/g,'');
  const otp=document.getElementById('otpInput').value;
  const res=await fetch(`${API_URL}/api/auth/verify-otp`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone,otp})});
  const data=await res.json();
  if(data.success){
    currentUser=data.user; localStorage.setItem('patakeja_user',JSON.stringify(currentUser));
    closeModal('loginModal'); updateHeader(); if(pendingAction) pendingAction();
  } else { document.getElementById('loginStatus').textContent='Wrong code'; }
}
async function viewListing(id){
  currentListing=allListings.find(l=>l.id===id);
  requireLogin(async ()=>{
    const res=await fetch(`${API_URL}/api/unlocks/check?user_id=${currentUser.id}&listing_id=${id}`);
    const {unlocked,phone}=await res.json();
    if(unlocked){ alert('Caretaker: '+phone); } else { document.getElementById('payModal').classList.add('active'); }
  });
}
async function initiateSTK(){
  const btn=document.getElementById('payBtn'); btn.disabled=true; btn.textContent='Sending...';
  await fetch(`${API_URL}/api/pochi/stkpush`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:currentUser.phone,amount:100,reference:`UNLOCK_${currentListing.id}`,description:'Pata Keja',user_id:currentUser.id,listing_id:currentListing.id})});
  document.getElementById('payStatus').textContent='Check your phone for M-Pesa prompt';
}
</script>
</body>
</html>
