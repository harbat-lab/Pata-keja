<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pata Keja Logo</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f0f;
    font-family: 'Segoe UI', sans-serif;
  }
 .logo-container {
    text-align: center;
    padding: 40px;
  }
 .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
 .house-icon {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #00C851 0%, #00a041 100%);
    border-radius: 12px;
    position: relative;
    box-shadow: 0 8px 24px rgba(0, 200, 81, 0.4);
  }
 .house-icon::before {
    content: '';
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-bottom: 16px solid white;
  }
 .house-icon::after {
    content: '';
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 18px;
    background: white;
    border-radius: 2px;
  }
 .text {
    color: white;
  }
 .brand {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    margin: 0;
  }
 .brand span {
    color: #00C851;
  }
 .tagline {
    font-size: 12px;
    color: #888;
    margin: 4px 0 0 0;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
 .controls {
    margin-top: 40px;
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  button {
    background: #00C851;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  button:hover {
    background: #00a041;
  }
</style>
</head>
<body>
  <div class="logo-container">
    <div class="logo" id="logo">
      <div class="house-icon"></div>
      <div class="text">
        <h1 class="brand">PATA<span>KEJA</span></h1>
        <p class="tagline">Pay 100. Get Keys.</p>
      </div>
    </div>
    
    <div class="controls">
      <button onclick="downloadPNG()">Download PNG</button>
      <button onclick="downloadSVG()">Download SVG</button>
    </div>
  </div>

<script>
function downloadPNG() {
  const logo = document.getElementById('logo');
  html2canvas(logo, {
    backgroundColor: null,
    scale: 3
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = 'pata-keja-logo.png';
    link.href = canvas.toDataURL();
    link.click();
  });
}

function downloadSVG() {
  const svg = `
<svg width="300" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C851;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a041;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="0" y="10" width="60" height="60" rx="12" fill="url(#g)"/>
  <path d="M30 28 L12 44 L48 44 Z" fill="white"/>
  <rect x="20" y="44" width="20" height="18" rx="2" fill="white"/>
  <text x="75" y="45" font-family="Segoe UI, sans-serif" font-size="36" font-weight="800" fill="white">PATA</text>
  <text x="165" y="45" font-family="Segoe UI, sans-serif" font-size="36" font-weight="800" fill="#00C851">KEJA</text>
  <text x="75" y="62" font-family="Segoe UI, sans-serif" font-size="10" letter-spacing="2" fill="#888">PAY 100. GET KEYS.</text>
</svg>`;
  
  const blob = new Blob([svg], {type: 'image/svg+xml'});
  const link = document.createElement('a');
  link.download = 'pata-keja-logo.svg';
  link.href = URL.createObjectURL(blob);
  link.click();
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
